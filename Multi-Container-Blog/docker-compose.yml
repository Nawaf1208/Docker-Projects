services:
  web:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_USER: bloguser
      MYSQL_PASSWORD: mysecretpassword
      MYSQL_DATABASE: blogdb

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: blogdb
      MYSQL_USER: bloguser
      MYSQL_PASSWORD: mysecretpassword
    volumes:
      - db-data:/var/lib/mysql
  
volumes:
  db-data: